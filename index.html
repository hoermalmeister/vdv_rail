<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDV Vlakové linky</title>

    <link rel="icon" type="image/svg+xml" href="icon.svg">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="map"></div>

    <div class="map-overlay">
        <h1>VDV Vlakové linky</h1>
        <p>Tloušťka čáry reprezentuje frekvenci. Najeďte na linku pro náhled, <b>kliknutím menu připnete</b> a zobrazíte vlaky.</p>
    </div>

    <div id="planner-backdrop" onclick="window.togglePlannerModal(false)"></div>

    <div class="planner-container">
        <button class="planner-mobile-btn" onclick="window.togglePlannerModal(true)">
            <span>🔍</span> Vyhledávač spojení (Beta)
        </button>

        <div id="planner-box" class="planner-box">
            <div class="planner-header">
                <h2>Vyhledávač spojení</h2>
                <button class="planner-close-mobile" onclick="window.togglePlannerModal(false)">&times;</button>
            </div>
            
            <div class="planner-group">
                <label>Odkud</label>
                <input type="text" class="planner-input" placeholder="Např. Jihlava">
            </div>
            
            <div class="planner-group">
                <label>Kam</label>
                <input type="text" class="planner-input" placeholder="Např. Havlíčkův Brod">
            </div>
            
            <div class="planner-row">
                <div class="planner-group">
                    <label>Den v týdnu</label>
                    <select class="planner-input">
                        <option>Pondělí</option>
                        <option>Úterý</option>
                        <option>Středa</option>
                        <option>Čtvrtek</option>
                        <option>Pátek</option>
                        <option>Sobota</option>
                        <option>Neděle</option>
                        <option>Státní svátek</option>
                    </select>
                </div>
                <div class="planner-group">
                    <label>Čas</label>
                    <input type="time" class="planner-input" value="08:00">
                </div>
            </div>
            
            <button class="planner-btn" onclick="alert('Vyhledávání bude zprovozněno v další fázi!')">Vyhledat</button>
        </div>
    </div>

    <script>
        window.togglePlannerModal = function(show) {
            const box = document.getElementById('planner-box');
            const backdrop = document.getElementById('planner-backdrop');
            if (show) {
                box.classList.add('mobile-active');
                backdrop.classList.add('active');
            } else {
                box.classList.remove('mobile-active');
                backdrop.classList.remove('active');
            }
        };
    </script>
    
    <div id="mobile-modal" class="modal-overlay">
        <div id="mobile-modal-content" class="modal-box"></div>
    </div>

    <div id="tt-modal" class="timetable-overlay">
        <div class="timetable-box">
            <div class="timetable-header">
                <h2 id="tt-title">Linka</h2>
                <button onclick="window.closeTimetable()" class="close-btn">&times;</button>
            </div>
            <div class="timetable-controls" id="tt-controls"></div>
            <div class="timetable-content" id="tt-content"></div>
            <div class="timetable-footer" id="tt-footer"></div>
        </div>
    </div>
    
    <script src="js/app.js" defer></script>
    <script src="js/map.js" defer></script>
    <script src="js/transfers.js" defer></script>
    <script src="js/timetable.js" defer></script>
</body>
</html>
