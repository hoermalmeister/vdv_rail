<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDV Vlakové linky</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #1a1a1a; overflow: hidden; }

        #map { height: 100vh; height: 100dvh; width: 100vw; }

        /* Map Tooltips & Popups */
        .leaflet-tooltip { background-color: rgba(25, 30, 36, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 12px 16px; font-size: 13px; pointer-events: none; }
        .leaflet-tooltip::before, .leaflet-tooltip::after { display: none !important; }
        .custom-popup .leaflet-popup-content-wrapper { background-color: rgba(25, 30, 36, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; border-radius: 8px; padding: 0; }
        .custom-popup .leaflet-popup-content { margin: 12px 16px; font-size: 13px; min-width: 260px; }
        .custom-popup .leaflet-popup-tip-container { display: none !important; }
        .custom-popup a.leaflet-popup-close-button { color: #94a3b8 !important; }

        .tooltip-header { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #ffffff; display: flex; align-items: center; gap: 8px; }
        .line-badge { display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 12px; cursor: pointer; transition: transform 0.1s; }
        .line-badge:hover { transform: scale(1.05); }
        .tooltip-segment { color: #94a3b8; margin-bottom: 8px; font-size: 12px; }
        .tooltip-destinations { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255, 255, 255, 0.1); color: #cbd5e1; }
        .dest-group { margin-top: 4px; }
        .dest-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .dest-count { font-weight: 700; color: #38bdf8; margin-left: 12px; }
        .dest-trains { font-size: 11px; color: #94a3b8; background: rgba(0, 0, 0, 0.3); padding: 6px 8px; border-radius: 4px; margin: 2px 0 8px 0; border-left: 2px solid rgba(255, 255, 255, 0.1); }
        .station-tooltip { background-color: #ffffff; color: #1e293b; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; min-width: 60px; pointer-events: auto; }

        /* Overlays & Legends */
        .map-overlay { position: absolute; top: 20px; right: 20px; z-index: 1000; background: rgba(25, 30, 36, 0.95); color: white; padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); max-width: 320px; pointer-events: none; }
        .map-overlay h1 { margin: 0 0 8px 0; font-size: 18px; }
        .map-overlay p { margin: 0; font-size: 13px; color: #94a3b8; }
        .map-legend { background: rgba(25, 30, 36, 0.95); color: #f1f5f9; padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); touch-action: pan-y; }
        .legend-title { font-weight: 700; margin-bottom: 10px; font-size: 13px; border-bottom: 1px solid #334155; padding-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; }
        .legend-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .legend-stops { font-size: 11px; color: #cbd5e1; font-weight: 600;}

        /* --- TIMETABLE MODAL UI --- */
        .timetable-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .timetable-box { background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; width: 95%; max-width: 1200px; height: 90vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .timetable-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; background: #1e293b; border-radius: 12px 12px 0 0; }
        .timetable-header h2 { margin: 0; font-size: 20px; color: white; display: flex; align-items: center; gap: 12px; }

        /* Timetable Controls (Tabs for Direction) */
        .timetable-controls { padding: 12px 24px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; gap: 10px; overflow-x: auto; }
        .dir-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.2s; }
        .dir-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }

        /* The Grid */
        .timetable-content { flex: 1; overflow: auto; padding: 0; position: relative; }
        table.modern-tt { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; color: #e2e8f0; }
        table.modern-tt th { background: #1e293b; padding: 12px 8px; font-weight: 600; color: #cbd5e1; border-bottom: 2px solid #334155; border-right: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 5; white-space: nowrap; }
        table.modern-tt td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); }
        table.modern-tt tbody tr:hover { background: rgba(255,255,255,0.03); }

        /* Sticky Station Column */
        table.modern-tt th:first-child, table.modern-tt td:first-child { position: sticky; left: 0; text-align: left; background: #1e293b; border-right: 2px solid #334155; font-weight: 600; z-index: 10; padding-left: 24px; }
        table.modern-tt th:first-child { z-index: 15; } /* Corner cell */

        .tt-note-row th { font-size: 11px; color: #94a3b8; background: #0f172a; top: 43px; border-bottom: 1px solid #334155; }
        .tt-time { font-family: monospace; font-size: 14px; }
        .tt-req { color: #facc15; font-size: 10px; vertical-align: super; margin-right: 2px; }
        .tt-pass { color: #475569; }

        /* Timetable Footer (Notes Legend) */
        .timetable-footer { padding: 12px 24px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 12px 12px; font-size: 12px; color: #94a3b8; display: flex; flex-wrap: wrap; gap: 16px; }
        .note-item { display: flex; gap: 6px; align-items: baseline; }
        .note-sym { font-weight: 700; color: #cbd5e1; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-corner { background: #0f172a; }

        @media (max-width: 768px) {
            .map-overlay { top: 10px; right: 10px; padding: 12px; max-width: 250px; }
            .map-legend { max-height: 38dvh; overflow-y: auto; }
            .timetable-box { width: 100%; height: 100%; border-radius: 0; }
            .timetable-header { border-radius: 0; padding: 12px 16px; }
            table.modern-tt th:first-child, table.modern-tt td:first-child { padding-left: 12px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-overlay">
        <h1>VDV Vlakové linky</h1>
        <p>Tloušťka čáry reprezentuje frekvenci. Najeďte na linku pro náhled, <b>kliknutím</b> zobrazíte detail.</p>
    </div>

    <div id="mobile-modal" class="timetable-overlay" style="z-index: 3000;">
        <div id="mobile-modal-content" style="background: rgba(25,30,36,0.98); border-radius: 12px; padding: 20px; color: white; width:90%; max-width:380px;"></div>
    </div>

    <div id="tt-modal" class="timetable-overlay">
        <div class="timetable-box">
            <div class="timetable-header">
                <h2 id="tt-title">Linka</h2>
                <button onclick="closeTimetable()" style="background:none; border:none; color:#94a3b8; font-size:28px; cursor:pointer;">&times;</button>
            </div>
            <div class="timetable-controls" id="tt-controls">
                </div>
            <div class="timetable-content" id="tt-content">
                </div>
            <div class="timetable-footer" id="tt-footer">
                </div>
        </div>
    </div>

    <script>
        const isMobile = window.innerWidth <= 768 || L.Browser.mobile;

        function getContrastColor(hexColor) {
            if (!hexColor) return '#ffffff';
            hexColor = hexColor.replace("#", "");
            if (hexColor.length === 3) hexColor = hexColor[0] + hexColor[0] + hexColor[1] + hexColor[1] + hexColor[2] + hexColor[2];
            if (hexColor.length !== 6) return '#ffffff';
            const r = parseInt(hexColor.slice(0, 2), 16), g = parseInt(hexColor.slice(2, 4), 16), b = parseInt(hexColor.slice(4, 6), 16);
            return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 140) ? '#1a1a1a' : '#ffffff';
        }

        const map = L.map('map').setView([49.4, 15.6], 9);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        // Global Data Stores
        window.stationsData = {};
        window.routesData = [];
        window.timetablesData = {};
        window.notesDict = {};
        window.lineColorsDict = {};

        // --- ASYNC DATA LOADING ---
        async function loadMapData() {
            try {
                const [stationsRes, routesRes, ttRes, notesRes] = await Promise.all([
                    fetch('stations.json'),
                    fetch('routes.json'),
                    fetch('timetables_master.json'),
                    fetch('notes_dict.json')
                ]);

                window.stationsData = await stationsRes.json();
                window.routesData = await routesRes.json();
                window.timetablesData = await ttRes.json();
                window.notesDict = await notesRes.json();

                initializeMap();
            } catch (error) {
                console.error("Chyba při načítání dat:", error);
                alert("Nepodařilo se načíst JSON soubory. Ujistěte se, že běžíte na lokálním serveru.");
            }
        }

        // --- TIMETABLE GENERATION LOGIC ---
        window.openTimetable = function(lineName) {
            const ttModal = document.getElementById('tt-modal');
            const title = document.getElementById('tt-title');
            const controls = document.getElementById('tt-controls');
            const content = document.getElementById('tt-content');
            const footer = document.getElementById('tt-footer');

            const lineColor = window.lineColorsDict[lineName] || '#ffffff';
            const textColor = getContrastColor(lineColor);

            title.innerHTML = `<span class="line-badge" style="background-color:${lineColor}; color:${textColor}; font-size: 16px; padding: 4px 12px;">${lineName}</span> Jízdní řád`;

            // 1. Gather all Train IDs for this line
            let lineTrains = new Set();
            window.routesData.forEach(r => {
                if (r.lineName === lineName || r.changesTo === lineName) {
                    if (r.trainNames) r.trainNames.forEach(t => lineTrains.add(t));
                }
            });

            // 2. Extract train data from master JSON
            let extractedTrains = [];
            for (let pdf in window.timetablesData) {
                let tDict = window.timetablesData[pdf].trains;
                if(!tDict) continue;

                lineTrains.forEach(tId => {
                    if (tDict[tId]) {
                        extractedTrains.push({ id: tId, ...tDict[tId] });
                    }
                });
            }

            if (extractedTrains.length === 0) {
                content.innerHTML = `<div style="padding:24px; text-align:center; color:#94a3b8;">Pro tuto linku zatím nejsou k dispozici data jízdních řádů.</div>`;
                controls.innerHTML = ''; footer.innerHTML = '';
                ttModal.style.display = 'flex';
                return;
            }

            // 3. Group trains by Starting Station (Direction)
            let directions = {};
            extractedTrains.forEach(train => {
                if(train.stops && train.stops.length > 0) {
                    let startStation = train.stops[0].station;
                    let endStation = train.stops[train.stops.length - 1].station;
                    let dirKey = `Z: ${startStation}`;

                    if(!directions[dirKey]) directions[dirKey] = { label: `Směr ${endStation}`, trains: [] };
                    directions[dirKey].trains.push(train);
                }
            });

            // Build Controls (Tabs)
            let dirKeys = Object.keys(directions);
            controls.innerHTML = dirKeys.map((key, idx) =>
                `<button class="dir-btn ${idx === 0 ? 'active' : ''}" onclick="renderTimetableGrid('${key}')">${key}</button>`
            ).join('');

            // Store for rendering
            window.currentTimetableData = directions;

            // Render first tab
            renderTimetableGrid(dirKeys[0]);
            ttModal.style.display = 'flex';
        };

        window.renderTimetableGrid = function(dirKey) {
            // Update Tab UI
            document.querySelectorAll('.dir-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === dirKey) btn.classList.add('active');
            });

            const trains = window.currentTimetableData[dirKey].trains;
            const content = document.getElementById('tt-content');
            const footer = document.getElementById('tt-footer');

            // 1. Build Master Station List for this direction (Topological merge)
            let masterStations = [];
            trains.forEach(t => {
                let lastIndex = -1;
                t.stops.forEach(stop => {
                    let idx = masterStations.indexOf(stop.station);
                    if (idx === -1) {
                        masterStations.splice(lastIndex + 1, 0, stop.station);
                        lastIndex++;
                    } else {
                        lastIndex = idx;
                    }
                });
            });

            // 2. Collect used notes
            let usedNotes = new Set();

            // 3. Sort trains by departure time of their first stop
            trains.sort((a, b) => {
                let timeA = parseFloat(a.stops[0].time.replace('.', '.'));
                let timeB = parseFloat(b.stops[0].time.replace('.', '.'));
                return timeA - timeB;
            });

            // 4. Build Table HTML
            let html = `<table class="modern-tt"><thead><tr><th>Stanice</th>`;

            // Train IDs Row
            trains.forEach(t => { html += `<th>${t.id}</th>`; });
            html += `</tr><tr class="tt-note-row"><th></th>`;

            // Operation Notes Row
            trains.forEach(t => {
                let notesStr = (t.operation_notes || []).join(' ');
                (t.operation_notes || []).forEach(n => usedNotes.add(n));
                html += `<th>${notesStr}</th>`;
            });
            html += `</tr></thead><tbody>`;

            // Data Rows
            masterStations.forEach(station => {
                html += `<tr><td>${station}</td>`;
                trains.forEach(t => {
                    let stop = t.stops.find(s => s.station === station);
                    if (stop) {
                        let reqIcon = stop.request_stop ? `<span class="tt-req">×</span>` : '';
                        html += `<td>${reqIcon}<span class="tt-time">${stop.time}</span></td>`;
                    } else {
                        html += `<td><span class="tt-pass">|</span></td>`;
                    }
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            content.innerHTML = html;

            // 5. Build Legend
            let footerHtml = '';
            usedNotes.forEach(note => {
                let meaning = window.notesDict[note] || "Neznámá poznámka";
                footerHtml += `<div class="note-item"><span class="note-sym">${note}</span> ${meaning}</div>`;
            });

            // Add request stop legend item by default
            footerHtml += `<div class="note-item" style="margin-left: auto;"><span class="note-sym tt-req" style="font-size:14px;">×</span> Zastávka na znamení</div>`;

            footer.innerHTML = footerHtml;
        };

        window.closeTimetable = function() {
            document.getElementById('tt-modal').style.display = 'none';
        };

        // --- MAP INITIALIZATION ---
        function initializeMap() {
            const segmentsMap = {};
            const stationLines = {};
            const lineEndpoints = {};

            window.routesData.forEach(route => {
                window.lineColorsDict[route.lineName] = route.color;
                if (route.changesTo) window.lineColorsDict[route.changesTo] = route.changeColor || route.color;

                route.connections = route.trainNames ? route.trainNames.length : 0;
                const firstStation = route.waypoints[0];
                const lastStation = route.waypoints[route.waypoints.length - 1];

                // Legend Tracking
                if (route.changeAt && route.changesTo) {
                    const changeIndex = route.waypoints.indexOf(route.changeAt);
                    if (changeIndex !== -1) {
                        if (!lineEndpoints[route.lineName] || changeIndex + 1 > lineEndpoints[route.lineName].length) {
                            lineEndpoints[route.lineName] = { length: changeIndex + 1, start: firstStation, end: route.changeAt, color: route.color };
                        }
                        if (!lineEndpoints[route.changesTo] || route.waypoints.length - changeIndex > lineEndpoints[route.changesTo].length) {
                            lineEndpoints[route.changesTo] = { length: route.waypoints.length - changeIndex, start: route.changeAt, end: lastStation, color: route.changeColor || route.color };
                        }
                    }
                } else {
                    if (!lineEndpoints[route.lineName] || route.waypoints.length > lineEndpoints[route.lineName].length) {
                        lineEndpoints[route.lineName] = { length: route.waypoints.length, start: firstStation, end: lastStation, color: route.color };
                    }
                }

                let currentLineName = route.lineName;
                let currentColor = route.color;
                let hasChanged = false;

                for (let i = 0; i < route.waypoints.length - 1; i++) {
                    const st1 = route.waypoints[i], st2 = route.waypoints[i + 1];
                    if (!window.stationsData[st1] || !window.stationsData[st2]) continue;

                    if (route.changeAt && (st1 === route.changeAt || hasChanged)) {
                        currentLineName = route.changesTo;
                        currentColor = route.changeColor || route.color;
                        hasChanged = true;
                    }

                    if (!stationLines[st1]) stationLines[st1] = new Set();
                    if (!stationLines[st2]) stationLines[st2] = new Set();
                    stationLines[st1].add(currentLineName);
                    stationLines[st2].add(currentLineName);

                    const isReversed = (window.stationsData[st1][1] > window.stationsData[st2][1]) ||
                                       (window.stationsData[st1][1] === window.stationsData[st2][1] && window.stationsData[st1][0] > window.stationsData[st2][0]);

                    const nodeA = isReversed ? st2 : st1;
                    const nodeB = isReversed ? st1 : st2;
                    const segmentKey = `${nodeA}---${nodeB}`;

                    if (!segmentsMap[segmentKey]) segmentsMap[segmentKey] = {};
                    if (!segmentsMap[segmentKey][currentLineName]) {
                        segmentsMap[segmentKey][currentLineName] = { lineName: currentLineName, connections: 0, color: currentColor, nodeA: nodeA, nodeB: nodeB, destinations: {} };
                    }

                    segmentsMap[segmentKey][currentLineName].connections += route.connections;
                }
            });

            // Draw Lines
            Object.entries(segmentsMap).forEach(([segKey, linesObj]) => {
                const linesOnSegment = Object.values(linesObj).sort((a, b) => a.lineName.localeCompare(b.lineName));
                let totalThickness = 0; const gap = 2;

                linesOnSegment.forEach(seg => { seg.thickness = (seg.connections * 0.22) + 2.5; totalThickness += seg.thickness; });
                totalThickness += (linesOnSegment.length - 1) * gap;
                let currentOffset = -totalThickness / 2;

                linesOnSegment.forEach((segData) => {
                    const offset = currentOffset + (segData.thickness / 2);
                    const latlngs = [ window.stationsData[segData.nodeA], window.stationsData[segData.nodeB] ];

                    L.polyline(latlngs, { color: '#1a1a1a', weight: segData.thickness + 2.5, offset: offset, interactive: false }).addTo(map);
                    L.polyline(latlngs, { color: segData.color, weight: segData.thickness, offset: offset, interactive: false }).addTo(map);

                    const hitBoxWeight = isMobile ? Math.max(segData.thickness + 24, 30) : segData.thickness + 12;
                    const interactionLine = L.polyline(latlngs, { color: '#000', weight: hitBoxWeight, opacity: 0, offset: offset }).addTo(map);

                    // Re-use simple tooltip logic for map hover
                    const tooltipHtml = `<div class="tooltip-header"><span class="line-badge" style="background-color:${segData.color}; color:${getContrastColor(segData.color)};" onclick="openTimetable('${segData.lineName}')">${segData.lineName}</span></div>
                                         <div class="tooltip-segment">${segData.nodeA} ↔ ${segData.nodeB}</div>
                                         <div style="font-size:11px; color:#94a3b8;">Kliknutím zobrazíte jízdní řád linky</div>`;

                    interactionLine.bindTooltip(tooltipHtml, { sticky: true });
                    interactionLine.on('click', () => window.openTimetable(segData.lineName));

                    currentOffset += segData.thickness + gap;
                });
            });

            // Draw Stations (Adding onclick to the badges)
            for (const [name, coords] of Object.entries(window.stationsData)) {
                const passingLines = stationLines[name] ? Array.from(stationLines[name]).sort() : [];
                const isJunction = passingLines.length > 1;

                let rowsHtml = '';
                for (let i = 0; i < passingLines.length; i += 3) {
                    const chunk = passingLines.slice(i, i + 3);
                    const badgesHtml = chunk.map(line => {
                        const bgColor = window.lineColorsDict[line] || '#cccccc';
                        return `<span class="line-badge" style="background-color: ${bgColor}; color: ${getContrastColor(bgColor)}; margin: 2px;" onclick="openTimetable('${line}')">${line}</span>`;
                    }).join('');
                    rowsHtml += `<div style="display: flex; justify-content: center; width: 100%; margin-bottom: 2px;">${badgesHtml}</div>`;
                }

                const tooltipHtml = `<div style="text-align: center; min-width: 80px; pointer-events: auto;">
                                        <div style="font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 6px;">${name}</div>
                                        <div style="display: flex; flex-direction: column; align-items: center;">${rowsHtml}</div>
                                     </div>`;

                L.circleMarker(coords, { radius: isJunction ? 5.5 : 3.5, fillColor: "#ffffff", color: "#1a1a1a", weight: isJunction ? 3 : 2, opacity: 1, fillOpacity: 1 })
                 .bindTooltip(tooltipHtml, { className: 'station-tooltip', direction: 'top', offset: [0, isJunction ? -10 : -8], interactive: true })
                 .addTo(map);
            }

            // Map Legend (Adding onclick to the badges)
            const legend = L.control({position: 'bottomleft'});
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'map-legend');
                L.DomEvent.disableClickPropagation(div); L.DomEvent.disableScrollPropagation(div);

                let html = `<div class="legend-title" id="legend-toggle"><span>Linky a konečné stanice</span><span class="legend-toggle-icon">▼</span></div>
                            <div class="legend-content" id="legend-content">`;

                Object.keys(lineEndpoints).sort().forEach(line => {
                    const data = lineEndpoints[line];
                    const endA = data.start < data.end ? data.start : data.end;
                    const endB = data.start < data.end ? data.end : data.start;
                    html += `<div class="legend-row">
                                <span class="line-badge" style="background-color: ${data.color}; color: ${getContrastColor(data.color)}; min-width: 32px;" onclick="openTimetable('${line}')">${line}</span>
                                <span class="legend-stops">${endA} ↔ ${endB}</span>
                             </div>`;
                });

                div.innerHTML = html + '</div>';
                setTimeout(() => {
                    div.querySelector('#legend-toggle').addEventListener('click', function() {
                        this.classList.toggle('collapsed');
                        div.querySelector('#legend-content').classList.toggle('collapsed');
                    });
                }, 0);
                return div;
            };
            legend.addTo(map);
        }

        loadMapData();
    </script>
</body>
</html>
