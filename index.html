    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #1a1a1a; }
        #map { height: 100vh; width: 100vw; }

        /* Modernized Hover Tooltip */
        .leaflet-tooltip {
            background-color: rgba(25, 30, 36, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.5;
            pointer-events: none;
        }
        .leaflet-tooltip::before,
        .leaflet-tooltip::after {
            display: none !important;
        }

        /* CLICK-TO-PIN POPUP (Matches Tooltip Styling) */
        .custom-popup .leaflet-popup-content-wrapper {
            background-color: rgba(25, 30, 36, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0;
        }
        .custom-popup .leaflet-popup-content {
            margin: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            min-width: 260px;
        }
        .custom-popup .leaflet-popup-tip-container { display: none !important; }
        .custom-popup a.leaflet-popup-close-button {
            color: #94a3b8 !important;
            top: 10px !important;
            right: 10px !important;
            font-size: 16px !important;
            padding: 0 !important;
        }
        .custom-popup a.leaflet-popup-close-button:hover { color: #ffffff !important; }

        /* Internal Content Styling */
        .tooltip-header {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 16px;
        }

        /* Line Badges */
        .line-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 12px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15); /* Gives a slight border for visibility */
        }

        .tooltip-segment { color: #94a3b8; margin-bottom: 8px; font-size: 12px; }
        .tooltip-connections { font-weight: 600; color: #e2e8f0; }
        .tooltip-destinations {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        /* Dropdown Train Names Styling */
        .dest-details { margin-top: 2px; }
        .dest-details summary { list-style: none; outline: none; }
        .dest-details summary::-webkit-details-marker { display: none; }

        .dest-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }
        .dest-right { display: flex; align-items: center; }
        .dest-count { font-weight: 700; color: #38bdf8; margin-left: 12px; }

        .dest-arrow {
            font-size: 9px;
            color: #64748b;
            margin-left: 8px;
            transition: transform 0.2s ease;
            display: inline-block;
        }
        .dest-details[open] .dest-arrow { transform: rotate(180deg); }
        .custom-popup .dest-details summary { cursor: pointer; }
        .custom-popup .dest-row:hover { background-color: rgba(255, 255, 255, 0.08); }
        .leaflet-tooltip .dest-arrow { display: none; }

        .dest-trains {
            font-size: 11px;
            color: #94a3b8;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 8px;
            border-radius: 4px;
            margin: 4px 0 6px 4px;
            word-wrap: break-word;
            line-height: 1.5;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Station Tooltip specifically */
        .station-tooltip {
            background-color: #ffffff;
            color: #1e293b;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: normal;
            min-width: 60px;
        }

        .leaflet-marker-pane { z-index: 650; }

        /* Title Box Overlay */
        .map-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(25, 30, 36, 0.95);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 320px;
            pointer-events: none;
        }
        .map-overlay h1 { margin: 0 0 8px 0; font-size: 18px; letter-spacing: 0.5px; }
        .map-overlay p { margin: 0; font-size: 13px; color: #94a3b8; line-height: 1.5; }
    </style>
</head>

            {"lineName": "J5", "waypoints": ["Moravské Budějovice", "Jemnice"], "color": "#BFEF45", "trainNames": ["Os 18391", "Os 18393", "Os 18395", "Os 18390", "Os 18392", "Os 18394"]},
            {"lineName": "J4", "waypoints": ["Studenec", "Velké Meziříčí zastávka", "Velké Meziříčí"], "color": "#469990", "trainNames": ["Os 24960", "Os 24962", "Os 24964", "Os 24966", "Os 24968", "Os 24970", "Os 24972", "Os 24974", "Os 24976", "Os 24963", "Os 24965", "Os 24967", "Os 24969", "Os 24971", "Os 24973", "Os 24975", "Os 24977"]},
            {"lineName": "J4", "waypoints": ["Studenec", "Velké Meziříčí zastávka"], "color": "#469990", "trainNames": ["Os 24961"]},
            {"lineName": "R54", "waypoints": ["Jihlava", "Okříšky", "Třebíč", "Studenec", "Náměšť nad Oslavou", "Zastávka u Brna", "Brno"], "color": "#9A6324", "trainNames": ["Sp 1926", "Sp 1928", "Sp 1925", "Sp 1927"]},
            {"lineName": "S81", "waypoints": ["Havlíčkův Brod", "Dobronín", "Jihlava", "Okříšky", "Moravské Budějovice", "Znojmo"], "color": "#F032E6", "trainNames": ["Sp 1934", "Sp 1935"]},
            {"lineName": "S31", "waypoints": ["Tišnov", "Nedvědice"], "color": "#000075", "trainNames": ["Os 14931", "Os 14933", "Os 14935", "Os 14937", "Os 14939", "Os 14941", "Os 14943", "Os 14945", "Os 14947", "Os 14930", "Os 14932", "Os 14934", "Os 14936", "Os 14938", "Os 14940", "Os 14942", "Os 14944", "Os 14948"]},
            {"lineName": "S31", "waypoints": ["Tišnov", "Nedvědice", "Bystřice", "Nové Město na Moravě", "Žďár nad Sázavou"], "color": "#000075", "trainNames": ["Os 14901", "Os 14900"]},
            {"lineName": "S31", "waypoints": ["Tišnov", "Nedvědice", "Bystřice", "Nové Město na Moravě", "Žďár nad Sázavou", "Havlíčkův Brod"], "color": "#000075", "trainNames": ["Os 8741", "Os 8743", "Os 8745", "Os 8747", "Os 8749", "Os 8751", "Os 8753", "Os 8755", "Os 8742", "Os 8744", "Os 8746", "Os 8748", "Os 8750", "Os 8752", "Os 8754"]},
            {"lineName": "S31", "waypoints": ["Tišnov", "Nedvědice", "Bystřice"], "color": "#000075", "trainNames": ["Os 14946"]},
            {"lineName": "S31", "waypoints": ["Nedvědice", "Bystřice", "Nové Město na Moravě", "Žďár nad Sázavou", "Havlíčkův Brod"], "color": "#000075", "trainNames": ["Os 8740"]}
        ];

        // 2. Precalculate Line Colors for Station Badges & Aggregate Data
        const segmentsMap = {};
        const stationLines = {};
        const lineColorsDict = {};

        routes.forEach(route => {
            lineColorsDict[route.lineName] = route.color;
            if (route.changesTo) {
                lineColorsDict[route.changesTo] = route.changeColor || route.color;
            }

            if (route.trainNames && Array.isArray(route.trainNames)) {
                route.connections = route.trainNames.length;
            } else {
                route.connections = route.connections || 0;
            }

            const firstStation = route.waypoints[0];
            const lastStation = route.waypoints[route.waypoints.length - 1];

            let currentLineName = route.lineName;
            let currentColor = route.color;
            let hasChanged = false;

            for (let i = 0; i < route.waypoints.length - 1; i++) {
                const st1 = route.waypoints[i];
                const st2 = route.waypoints[i + 1];

                if (!stations[st1] || !stations[st2]) continue;

                if (route.changeAt && (st1 === route.changeAt || hasChanged)) {
                    currentLineName = route.changesTo;
                    currentColor = route.changeColor || route.color;
                    hasChanged = true;
                }

                let segmentRouteLabel = "";
                if (route.changesTo && route.changeAt) {
                    if (!hasChanged) {
                        const cColor = route.changeColor || '#ffffff';
                        const textC = getContrastColor(cColor);
                        segmentRouteLabel = `${firstStation} ↔ ${route.changeAt} <span class="line-badge" style="background-color: ${cColor}; color: ${textC}; margin: 0 4px; padding: 1px 6px; font-size: 11px;">${route.changesTo}</span> ↔ ${lastStation}`;
                    } else {
                        const origColor = route.color || '#ffffff';
                        const textO = getContrastColor(origColor);
                        segmentRouteLabel = `${firstStation} ↔ <span class="line-badge" style="background-color: ${origColor}; color: ${textO}; margin: 0 4px; padding: 1px 6px; font-size: 11px;">${route.lineName}</span> ${route.changeAt} ↔ ${lastStation}`;
                    }
                } else {
                    const endA = firstStation < lastStation ? firstStation : lastStation;
                    const endB = firstStation < lastStation ? lastStation : firstStation;
                    segmentRouteLabel = `${endA} ↔ ${endB}`;
                }

                if (!stationLines[st1]) stationLines[st1] = new Set();
                if (!stationLines[st2]) stationLines[st2] = new Set();
                stationLines[st1].add(currentLineName);
                stationLines[st2].add(currentLineName);

                const lon1 = stations[st1][1];
                const lon2 = stations[st2][1];
                let isReversed = false;

                if (lon1 > lon2) {
                    isReversed = true;
                } else if (lon1 === lon2) {
                    isReversed = stations[st1][0] > stations[st2][0];
                }

                const nodeA = isReversed ? st2 : st1;
                const nodeB = isReversed ? st1 : st2;
                const segmentKey = `${nodeA}---${nodeB}`;

                if (!segmentsMap[segmentKey]) segmentsMap[segmentKey] = {};

                const lineKey = currentLineName;

                if (!segmentsMap[segmentKey][lineKey]) {
                    segmentsMap[segmentKey][lineKey] = {
                        lineName: currentLineName,
                        connections: 0,
                        color: currentColor,
                        nodeA: nodeA,
                        nodeB: nodeB,
                        destinations: {}
                    };
                }

                segmentsMap[segmentKey][lineKey].connections += route.connections;

                if (!segmentsMap[segmentKey][lineKey].destinations[segmentRouteLabel]) {
                    segmentsMap[segmentKey][lineKey].destinations[segmentRouteLabel] = {
                        count: 0,
                        trains: []
                    };
                }

                segmentsMap[segmentKey][lineKey].destinations[segmentRouteLabel].count += route.connections;
                if (route.trainNames) {
                    segmentsMap[segmentKey][lineKey].destinations[segmentRouteLabel].trains.push(...route.trainNames);
                }
            }
        });

        // 3. Draw Segments
        Object.entries(segmentsMap).forEach(([segKey, linesObj]) => {
            const linesOnSegment = Object.values(linesObj);
            linesOnSegment.sort((a, b) => a.lineName.localeCompare(b.lineName));

            let totalThickness = 0;
            const gap = 2;

            linesOnSegment.forEach(seg => {
                seg.thickness = (seg.connections * 0.22) + 2.5;
                totalThickness += seg.thickness;
            });

            totalThickness += (linesOnSegment.length - 1) * gap;
            let currentOffset = -totalThickness / 2;

            linesOnSegment.forEach((segData) => {
                const offset = currentOffset + (segData.thickness / 2);
                const latlngs = [ stations[segData.nodeA], stations[segData.nodeB] ];

                L.polyline(latlngs, {
                    color: '#1a1a1a',
                    weight: segData.thickness + 2.5,
                    opacity: 1,
                    lineCap: 'round',
                    lineJoin: 'round',
                    offset: offset
                }).addTo(map);

                const polyline = L.polyline(latlngs, {
                    color: segData.color,
                    weight: segData.thickness,
                    opacity: 1,
                    lineCap: 'round',
                    lineJoin: 'round',
                    offset: offset
                }).addTo(map);

                let destinationsHtml = "";
                for (const [routeLabel, data] of Object.entries(segData.destinations)) {
                    const uniqueTrains = [...new Set(data.trains)].sort().join(', ');

                    destinationsHtml += `
                        <details class="dest-details">
                            <summary class="dest-row">
                                <span>${routeLabel}</span>
                                <span class="dest-right">
                                    <span class="dest-count">${data.count}</span>
                                    <span class="dest-arrow">▼</span>
                                </span>
                            </summary>
                            <div class="dest-trains">${uniqueTrains}</div>
                        </details>
                    `;
                }

                const badgeTextColor = getContrastColor(segData.color);

                const tooltipContent = `
                    <div class="tooltip-header">
                        <span class="line-badge" style="background-color: ${segData.color}; color: ${badgeTextColor};">${segData.lineName}</span>
                    </div>
                    <div class="tooltip-segment">${segData.nodeA} ↔ ${segData.nodeB}</div>
                    <div class="tooltip-connections">Celkem na úseku: ${segData.connections}</div>
                    <div class="tooltip-destinations">
                        <div style="font-size:11px; text-transform:uppercase; color:#64748b; margin-bottom:4px; letter-spacing:0.5px;">Přímá spojení (Kliknutím rozbalte)</div>
                        ${destinationsHtml}
                    </div>
                `;

                polyline.bindTooltip(tooltipContent, { sticky: true });
                polyline.bindPopup(tooltipContent, { className: 'custom-popup' });

                polyline.on('popupopen', function() {
                    this.closeTooltip();
                    this.unbindTooltip();
                });

                polyline.on('popupclose', function() {
                    this.bindTooltip(tooltipContent, { sticky: true });
                });

                currentOffset += segData.thickness + gap;
            });
        });

        // 4. Draw Stations with Chunked (Max 3/row) Hover Icons
        for (const [name, coords] of Object.entries(stations)) {
            const passingLines = stationLines[name] ? Array.from(stationLines[name]).sort() : [];
            const isJunction = passingLines.length > 1;

            // NEW: Group badges into exact rows of 3 to guarantee centering and layout
            let rowsHtml = '';
            for (let i = 0; i < passingLines.length; i += 3) {
                const chunk = passingLines.slice(i, i + 3);
                const badgesHtml = chunk.map(line => {
                    const bgColor = lineColorsDict[line] || '#cccccc';
                    const textColor = getContrastColor(bgColor);
                    return `<span class="line-badge" style="background-color: ${bgColor}; color: ${textColor}; margin: 2px;">${line}</span>`;
                }).join('');

                // Each row is perfectly centered
                rowsHtml += `<div style="display: flex; justify-content: center; width: 100%; margin-bottom: 2px;">${badgesHtml}</div>`;
            }

            const tooltipHtml = `
                <div style="text-align: center; min-width: 80px;">
                    <div style="font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 6px;">${name}</div>
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        ${rowsHtml}
                    </div>
                </div>
            `;

            L.circleMarker(coords, {
                radius: isJunction ? 5.5 : 3.5,
                fillColor: "#ffffff",
                color: "#1a1a1a",
                weight: isJunction ? 3 : 2,
                opacity: 1,
                fillOpacity: 1
            }).bindTooltip(tooltipHtml, {
                className: 'station-tooltip',
                direction: 'top',
                offset: [0, isJunction ? -10 : -8]
            }).addTo(map);
        }
    </script>
</body>
</html>
